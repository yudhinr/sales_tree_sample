<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
.topbar{background:#fff;border-bottom:0.5px solid #ddd;padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-size:15px;font-weight:500}
.topbar-right{display:flex;align-items:center;gap:10px}
.last-updated{font-size:12px;color:#aaa}
.btn-refresh{font-size:12px;padding:5px 12px;border:0.5px solid #ccc;border-radius:6px;background:#fff;cursor:pointer;display:flex;align-items:center;gap:4px;color:#444}
.btn-refresh:hover{background:#f5f5f3}
.main{padding:20px 24px;max-width:1100px;margin:0 auto}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.filters label{font-size:12px;color:#666}
.filters select{font-size:13px;padding:6px 10px;border-radius:6px;border:0.5px solid #ccc;background:#fff;color:#1a1a1a;cursor:pointer}
.state-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px;text-align:center}
.state-screen .icon{font-size:40px;color:#ccc}
.state-screen h2{font-size:16px;font-weight:500;color:#333}
.state-screen p{font-size:13px;color:#888;max-width:360px;line-height:1.6}
.btn-retry{font-size:13px;padding:10px 24px;border-radius:8px;border:none;background:#378ADD;color:#fff;cursor:pointer;font-weight:500;margin-top:4px}
.btn-retry:hover{background:#2a6fb5}
.tree-section{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:20px;margin-bottom:16px}
.tree{display:flex;flex-direction:column;align-items:center;gap:0}
.tree-row{display:flex;gap:12px;justify-content:center;position:relative;z-index:1}
.node{background:#fff;border:0.5px solid #ddd;border-radius:10px;padding:10px 12px;width:145px;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s}
.node:hover{border-color:#378ADD;box-shadow:0 0 0 2px rgba(55,138,221,0.1)}
.node.active{border:1.5px solid #378ADD;box-shadow:0 0 0 3px rgba(55,138,221,0.12)}
.node.empty{opacity:0.5}
.node-label{font-size:10px;color:#888;margin-bottom:2px;letter-spacing:0.04em;text-transform:uppercase}
.node-val{font-size:14px;font-weight:500;color:#1a1a1a;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node-val.na{color:#bbb;font-size:12px;font-weight:400}
.sparkline-wrap{height:34px;position:relative}
.connectors{width:100%;height:28px;pointer-events:none}
.connectors svg{width:100%;height:28px;overflow:visible}
.trend-section{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:16px 20px;margin-bottom:16px}
.trend-title{font-size:13px;color:#555;margin-bottom:12px;font-weight:500}
.trend-wrap{position:relative;width:100%;height:180px}
.breakdown-section{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:16px 20px;margin-bottom:16px}
.section-title{font-size:12px;color:#888;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:12px}
.breakdown-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.bc{background:#f8f8f6;border-radius:8px;padding:10px 12px}
.bc-label{font-size:11px;color:#888;margin-bottom:3px}
.bc-val{font-size:14px;font-weight:500;color:#1a1a1a}
.bc-sub{font-size:11px;color:#aaa;margin-top:2px}
</style>
</head>
<body>

<div class="topbar">
  <h1>Sales Dashboard</h1>
  <div class="topbar-right">
    <span class="last-updated" id="last-updated"></span>
    <button class="btn-refresh" id="btn-refresh" onclick="loadData()" style="display:none">
      <i class="ti ti-refresh" style="font-size:14px"></i> Refresh
    </button>
  </div>
</div>

<div class="main">

  <div id="screen-loading" class="state-screen">
    <i class="ti ti-loader icon"></i>
    <h2>Memuat dashboard...</h2>
    <p>Mengambil data dari Google Sheet</p>
  </div>

  <div id="screen-error" class="state-screen" style="display:none">
    <i class="ti ti-alert-circle icon" style="color:#e74c3c"></i>
    <h2>Gagal memuat data</h2>
    <p id="error-msg"></p>
    <button class="btn-retry" onclick="loadData()">Coba lagi</button>
  </div>

  <div class="filters" id="filters" style="display:none">
    <label>Periode</label>
    <select id="sel-period" onchange="render()">
      <option value="daily">Harian</option>
      <option value="monthly" selected>Bulanan</option>
      <option value="yearly">Tahunan</option>
    </select>
    <label>Channel</label>
    <select id="sel-channel" onchange="render()">
      <option value="all">Semua channel</option>
    </select>
  </div>

  <div id="dashboard" style="display:none">
    <div class="tree-section">
      <div class="tree">
        <div class="tree-row">
          <div class="node" id="node-netsales" onclick="selectNode('netsales')">
            <div class="node-label">Net Sales</div>
            <div class="node-val" id="val-netsales">—</div>
            <div class="sparkline-wrap"><canvas id="sp-netsales"></canvas></div>
          </div>
        </div>
        <div class="connectors"><svg id="conn1"></svg></div>
        <div class="tree-row">
          <div class="node" id="node-aov" onclick="selectNode('aov')">
            <div class="node-label">AOV</div>
            <div class="node-val" id="val-aov">—</div>
            <div class="sparkline-wrap"><canvas id="sp-aov"></canvas></div>
          </div>
          <div class="node" id="node-closing" onclick="selectNode('closing')">
            <div class="node-label">Closing</div>
            <div class="node-val" id="val-closing">—</div>
            <div class="sparkline-wrap"><canvas id="sp-closing"></canvas></div>
          </div>
        </div>
        <div class="connectors"><svg id="conn2"></svg></div>
        <div class="tree-row">
          <div class="node" id="node-aur" onclick="selectNode('aur')">
            <div class="node-label">AUR</div>
            <div class="node-val" id="val-aur">—</div>
            <div class="sparkline-wrap"><canvas id="sp-aur"></canvas></div>
          </div>
          <div class="node" id="node-upt" onclick="selectNode('upt')">
            <div class="node-label">UPT</div>
            <div class="node-val" id="val-upt">—</div>
            <div class="sparkline-wrap"><canvas id="sp-upt"></canvas></div>
          </div>
          <div class="node empty" id="node-traffic" onclick="selectNode('traffic')">
            <div class="node-label">Traffic</div>
            <div class="node-val na" id="val-traffic">Belum ada data</div>
            <div class="sparkline-wrap"><canvas id="sp-traffic"></canvas></div>
          </div>
          <div class="node empty" id="node-scr" onclick="selectNode('scr')">
            <div class="node-label">SCR</div>
            <div class="node-val na" id="val-scr">Belum ada data</div>
            <div class="sparkline-wrap"><canvas id="sp-scr"></canvas></div>
          </div>
        </div>
      </div>
    </div>

    <div class="trend-section" id="trend-section" style="display:none">
      <div class="trend-title" id="trend-title">—</div>
      <div class="trend-wrap"><canvas id="trend-chart"></canvas></div>
    </div>

    <div class="breakdown-section">
      <div class="section-title">Breakdown per channel</div>
      <div class="breakdown-grid" id="breakdown"></div>
    </div>
  </div>

</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzS-98lXDZtnImILHtoSVM9jutHbGFvLv30XhE5twaDp4RVuNcyYu4e1oxBpAKKZLu7/exec";
const TOKEN   = "dashboard-jubelio";
const MONTHS  = ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Ags","Sep","Okt","Nov","Des"];
const COLORS  = {netsales:"#378ADD",aov:"#1D9E75",closing:"#D85A30",aur:"#BA7517",upt:"#7F77DD"};

let RAW = [];
let sparkCharts = {};
let trendChart  = null;
let activeNode  = null;

function showScreen(id){
  ["screen-loading","screen-error"].forEach(s=>document.getElementById(s).style.display="none");
  document.getElementById("dashboard").style.display="none";
  document.getElementById("filters").style.display="none";
  document.getElementById("btn-refresh").style.display="none";
  if(id==="dashboard"){
    document.getElementById("dashboard").style.display="block";
    document.getElementById("filters").style.display="flex";
    document.getElementById("btn-refresh").style.display="flex";
  } else if(id){
    document.getElementById(id).style.display="flex";
  }
}

function fmt(v){
  if(v>=1e9) return "Rp "+(v/1e9).toFixed(1)+"M";
  if(v>=1e6) return "Rp "+(v/1e6).toFixed(1)+"jt";
  if(v>=1e3) return "Rp "+(v/1e3).toFixed(0)+"rb";
  return "Rp "+Math.round(v);
}

async function loadData(){
  showScreen("screen-loading");
  try{
    const res  = await fetch(GAS_URL+"?token="+TOKEN);
    const json = await res.json();

    if(json.error==="unauthorized"){
      showScreen("screen-error");
      document.getElementById("error-msg").textContent="Token tidak valid. Hubungi admin.";
      return;
    }
    if(json.error){
      showScreen("screen-error");
      document.getElementById("error-msg").textContent=json.message||json.error;
      return;
    }

    RAW = (json.transaksi||[]).map(r=>({
      channel   : r.channel,
      order_id  : r.order_id,
      order_date: r.order_date,
      item_qty  : Number(r.item_qty),
      item_price: Number(r.item_price),
      trx_amount: Number(r.trx_amount),
      city      : r.city
    }));

    const channels = [...new Set(RAW.map(r=>r.channel))].sort();
    const sel = document.getElementById("sel-channel");
    sel.innerHTML = '<option value="all">Semua channel</option>';
    channels.forEach(ch=>{
      const o=document.createElement("option");
      o.value=ch; o.textContent=ch; sel.appendChild(o);
    });

    document.getElementById("last-updated").textContent=
      "Update: "+new Date().toLocaleTimeString("id-ID");

    showScreen("dashboard");
    render();

  }catch(e){
    showScreen("screen-error");
    document.getElementById("error-msg").textContent="Gagal terhubung: "+e.message;
  }
}

function filterData(){
  const ch=document.getElementById("sel-channel").value;
  return ch==="all"?RAW:RAW.filter(r=>r.channel===ch);
}

function getKey(row,period){
  const d=new Date(row.order_date);
  if(period==="monthly") return d.getMonth();
  if(period==="yearly")  return d.getFullYear();
  return row.order_date;
}

function computeMetrics(data,period){
  const g={};
  data.forEach(r=>{
    const k=getKey(r,period);
    if(!g[k]) g[k]={sales:0,qty:0,orders:0,prices:[]};
    g[k].sales+=r.trx_amount; g[k].qty+=r.item_qty;
    g[k].orders+=1; g[k].prices.push(r.item_price);
  });
  let keys=Object.keys(g);
  if(period==="monthly") keys=keys.map(Number).sort((a,b)=>a-b);
  else keys=keys.sort((a,b)=>a>b?1:-1);
  const labels=period==="monthly"?keys.map(k=>MONTHS[k]):keys.map(String);
  return{
    labels,
    netsales: keys.map(k=>g[k].sales),
    closing:  keys.map(k=>g[k].orders),
    aov:      keys.map(k=>g[k].sales/g[k].orders),
    aur:      keys.map(k=>g[k].prices.reduce((a,b)=>a+b,0)/g[k].prices.length),
    upt:      keys.map(k=>g[k].qty/g[k].orders)
  };
}

function makeSpark(id,data,color){
  const ctx=document.getElementById(id); if(!ctx)return;
  if(sparkCharts[id]) sparkCharts[id].destroy();
  sparkCharts[id]=new Chart(ctx,{
    type:"line",
    data:{labels:data.map((_,i)=>i),datasets:[{data,borderColor:color,borderWidth:1.5,pointRadius:0,tension:0.4,fill:true,backgroundColor:color+"22"}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}},animation:{duration:300}}
  });
}

function selectNode(key){
  document.querySelectorAll(".node").forEach(n=>n.classList.remove("active"));
  document.getElementById("node-"+key).classList.add("active");
  activeNode=key;
  const data=filterData();
  const period=document.getElementById("sel-period").value;
  const m=computeMetrics(data,period);
  const labelMap={netsales:"Net Sales",aov:"AOV",closing:"Closing",aur:"AUR",upt:"UPT",traffic:"Traffic",scr:"SCR"};
  const trendSec=document.getElementById("trend-section");
  trendSec.style.display="block";
  if(key==="traffic"||key==="scr"){
    document.getElementById("trend-title").textContent=labelMap[key]+" — belum ada data";
    if(trendChart){trendChart.destroy();trendChart=null;}
    return;
  }
  const map={netsales:m.netsales,aov:m.aov,closing:m.closing,aur:m.aur,upt:m.upt};
  document.getElementById("trend-title").textContent="Trend: "+labelMap[key];
  const ctx=document.getElementById("trend-chart");
  if(trendChart) trendChart.destroy();
  trendChart=new Chart(ctx,{
    type:"line",
    data:{labels:m.labels,datasets:[{label:labelMap[key],data:map[key],borderColor:COLORS[key],borderWidth:2,pointRadius:3,pointBackgroundColor:COLORS[key],tension:0.4,fill:true,backgroundColor:COLORS[key]+"22"}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:11},autoSkip:false,maxRotation:0}},y:{ticks:{font:{size:11}},grid:{color:"rgba(0,0,0,0.05)"}}}}
  });
}

function renderBreakdown(data){
  const channels=[...new Set(RAW.map(r=>r.channel))].sort();
  document.getElementById("breakdown").innerHTML=channels.map(ch=>{
    const rows=data.filter(r=>r.channel===ch);
    if(!rows.length) return`<div class="bc"><div class="bc-label">${ch}</div><div class="bc-val">—</div></div>`;
    const sales=rows.reduce((a,r)=>a+r.trx_amount,0);
    const orders=rows.length;
    return`<div class="bc"><div class="bc-label">${ch}</div><div class="bc-val">${fmt(sales)}</div><div class="bc-sub">${orders} trx · AOV ${fmt(sales/orders)}</div></div>`;
  }).join("");
}

function drawConnectors(){
  requestAnimationFrame(()=>{
    const drawConn=(svgId,pairs)=>{
      const svg=document.getElementById(svgId); if(!svg)return;
      const sr=svg.getBoundingClientRect();
      let paths="";
      pairs.forEach(([pid,cid])=>{
        const p=document.getElementById(pid),c=document.getElementById(cid);
        if(!p||!c)return;
        const pr=p.getBoundingClientRect(),cr=c.getBoundingClientRect();
        const x1=pr.left+pr.width/2-sr.left,x2=cr.left+cr.width/2-sr.left,h=sr.height;
        paths+=`<path d="M${x1},0 C${x1},${h/2} ${x2},${h/2} ${x2},${h}" stroke="#ddd" stroke-width="1" fill="none"/>`;
      });
      svg.innerHTML=paths;
    };
    drawConn("conn1",[["node-netsales","node-aov"],["node-netsales","node-closing"]]);
    drawConn("conn2",[["node-aov","node-aur"],["node-aov","node-upt"],["node-closing","node-traffic"],["node-closing","node-scr"]]);
  });
}

function render(){
  const data=filterData();
  const period=document.getElementById("sel-period").value;
  const m=computeMetrics(data,period);
  const totSales=data.reduce((a,r)=>a+r.trx_amount,0);
  const totOrders=data.length;
  const allQty=data.reduce((a,r)=>a+r.item_qty,0);
  const allPrices=data.map(r=>r.item_price);
  const avgAUR=allPrices.reduce((a,b)=>a+b,0)/allPrices.length;

  document.getElementById("val-netsales").textContent=fmt(totSales);
  document.getElementById("val-aov").textContent=fmt(totSales/totOrders);
  document.getElementById("val-closing").textContent=totOrders+" trx";
  document.getElementById("val-aur").textContent=fmt(avgAUR);
  document.getElementById("val-upt").textContent=(allQty/totOrders).toFixed(1)+"x";

  makeSpark("sp-netsales",m.netsales,COLORS.netsales);
  makeSpark("sp-aov",m.aov,COLORS.aov);
  makeSpark("sp-closing",m.closing,COLORS.closing);
  makeSpark("sp-aur",m.aur,COLORS.aur);
  makeSpark("sp-upt",m.upt,COLORS.upt);

  renderBreakdown(data);
  drawConnectors();
  if(activeNode&&activeNode!=="traffic"&&activeNode!=="scr") selectNode(activeNode);
}

window.addEventListener("resize",drawConnectors);
loadData();
</script>
</body>
</html>
